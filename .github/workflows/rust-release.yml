name: rust-release

on:
  workflow_dispatch:
  push:
    tags:
      - "rust-v*.*.*"
      - "codexext-v*.*.*"

permissions:
  contents: read

concurrency:
  group: rust-release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            executable_suffix: ""
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            executable_suffix: ""
          - runner: windows-2025
            target: x86_64-pc-windows-msvc
            executable_suffix: ".exe"
          - runner: windows-11-arm
            target: aarch64-pc-windows-msvc
            executable_suffix: ".exe"
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            executable_suffix: ""
          - runner: macos-15
            target: aarch64-apple-darwin
            executable_suffix: ""

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends clang cmake libssl-dev pkg-config

      - name: Configure Windows SQLite build
        if: runner.os == 'Windows'
        shell: pwsh
        run: Add-Content -Path $env:GITHUB_ENV -Value 'LIBSQLITE3_FLAGS=SQLITE_DISABLE_INTRINSIC'

      - name: Build Codex binaries
        working-directory: codex-rs
        run: cargo build --locked --release --target ${{ matrix.target }} --bin codex --bin codex-app-server --bin codex-code-mode-host

      - name: Stage artifact
        shell: pwsh
        env:
          EXE_SUFFIX: ${{ matrix.executable_suffix }}
        run: |
          $artifactDir = Join-Path $env:GITHUB_WORKSPACE 'artifact'
          New-Item -ItemType Directory -Force -Path $artifactDir | Out-Null

          @('codex', 'codex-app-server', 'codex-code-mode-host') | ForEach-Object {
            $binary = "$_$env:EXE_SUFFIX"
            $source = Join-Path $env:GITHUB_WORKSPACE "codex-rs/target/${{ matrix.target }}/release/$binary"
            Copy-Item -LiteralPath $source -Destination (Join-Path $artifactDir $binary)
          }

      - name: Upload GitHub Actions artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: codexext-${{ matrix.target }}-${{ github.sha }}
          path: artifact/*
          if-no-files-found: error
          retention-days: 30
