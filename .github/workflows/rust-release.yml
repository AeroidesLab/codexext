name: rust-release

on:
  workflow_dispatch:
  push:
    tags:
      - "rust-v*.*.*"
      - "codexext-v*.*.*"

permissions:
  contents: read

concurrency:
  group: rust-release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            executable_suffix: ""
          - os: macos-latest
            executable_suffix: ""
          - os: windows-latest
            executable_suffix: ".exe"

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends clang cmake libssl-dev pkg-config

      - name: Configure Windows SQLite build
        if: runner.os == 'Windows'
        shell: pwsh
        run: Add-Content -Path $env:GITHUB_ENV -Value 'LIBSQLITE3_FLAGS=SQLITE_DISABLE_INTRINSIC'

      - name: Build Codex binaries
        working-directory: codex-rs
        shell: bash
        run: |
          set -euo pipefail
          cargo build --locked --release \
            --bin codex \
            --bin codex-app-server \
            --bin codex-code-mode-host

      - name: Stage artifact
        shell: pwsh
        env:
          EXE_SUFFIX: ${{ matrix.executable_suffix }}
        run: |
          $artifactDir = Join-Path $env:GITHUB_WORKSPACE 'artifact'
          New-Item -ItemType Directory -Force -Path $artifactDir | Out-Null

          @('codex', 'codex-app-server', 'codex-code-mode-host') | ForEach-Object {
            $binary = "$_$env:EXE_SUFFIX"
            $source = Join-Path $env:GITHUB_WORKSPACE "codex-rs/target/release/$binary"
            Copy-Item -LiteralPath $source -Destination (Join-Path $artifactDir $binary)
          }

      - name: Upload GitHub Actions artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: codexext-${{ runner.os }}-${{ runner.arch }}-${{ github.sha }}
          path: artifact/*
          if-no-files-found: error
          retention-days: 30
